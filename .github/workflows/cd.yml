name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Dokploy deploy
    runs-on: self-hosted
    steps:
      - name: Call Dokploy Compose deploy webhook
        env:
          DOKPLOY_COMPOSE_WEBHOOK_URL: ${{ secrets.DOKPLOY_COMPOSE_WEBHOOK_URL }}
        run: |
          curl --fail-with-body -X POST "${DOKPLOY_COMPOSE_WEBHOOK_URL}"
